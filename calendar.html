<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBC — Planning Piquet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f0f2f5;
    --surface:   #ffffff;
    --border:    #e2e6ea;
    --text:      #1a2332;
    --muted:     #7a8899;
    --today-bg:  #1a2332;
    --today-fg:  #ffffff;

    --wc-bg:     #dbeafe;
    --wc-border: #3b82f6;
    --wc-text:   #1d4ed8;
    --wc-icon:   #60a5fa;

    --neige-bg:     #e0f2fe;
    --neige-border: #0ea5e9;
    --neige-text:   #0369a1;
    --neige-icon:   #38bdf8;

    --header-bg: #1a2332;
    --header-fg: #ffffff;

    --radius:    10px;
    --shadow:    0 2px 12px rgba(0,0,0,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  /* ── Header ── */
  .header {
    background: var(--header-bg);
    color: var(--header-fg);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: rgba(255,255,255,0.12);
    padding: 6px 10px;
    border-radius: 6px;
    letter-spacing: 1px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header h1 span {
    font-weight: 400;
    opacity: 0.6;
    font-size: 14px;
    margin-left: 8px;
  }

  /* ── Nav ── */
  .nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav button {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .nav button:hover { background: rgba(255,255,255,0.28); }

  .nav-label {
    font-size: 15px;
    font-weight: 600;
    min-width: 160px;
    text-align: center;
    text-transform: capitalize;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  .legend-dot.wc    { background: var(--wc-border); }
  .legend-dot.neige { background: var(--neige-border); }

  /* ── Calendar grid ── */
  .cal-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: #f7f9fc;
    border-bottom: 1px solid var(--border);
  }

  .cal-weekdays div {
    text-align: center;
    padding: 10px 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .cal-weekdays div:last-child,
  .cal-weekdays div:nth-child(6) {
    color: #b0bad0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .cal-day {
    min-height: 110px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 6px 6px;
    transition: background 0.1s;
    position: relative;
  }

  .cal-day:nth-child(7n)   { border-right: none; }
  .cal-day.empty           { background: #fafbfc; }
  .cal-day.weekend         { background: #fcfcfd; }
  .cal-day:hover:not(.empty) { background: #f5f7fa; }

  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 5px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 6px;
  }

  .cal-day.today .day-num {
    background: var(--today-bg);
    color: var(--today-fg);
    font-weight: 700;
  }

  /* ── Piquet badges ── */
  .piquet {
    border-radius: 6px;
    padding: 4px 6px;
    margin-bottom: 3px;
    font-size: 11px;
    line-height: 1.45;
    border-left: 3px solid transparent;
  }

  .piquet.wc {
    background: var(--wc-bg);
    border-color: var(--wc-border);
    color: var(--wc-text);
  }

  .piquet.neige {
    background: var(--neige-bg);
    border-color: var(--neige-border);
    color: var(--neige-text);
  }

  .piquet-type {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 2px;
    opacity: 0.75;
  }

  .piquet-role {
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Loading / Error ── */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 12px;
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-icon { font-size: 28px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .cal-day { min-height: 70px; padding: 4px 3px; }
    .piquet { font-size: 9px; padding: 3px 4px; }
    .header h1 span { display: none; }
    .nav-label { min-width: 120px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">CBC</div>
    <h1>Planning Piquet <span>Service de piquet</span></h1>
  </div>
  <div class="nav">
    <button id="btn-prev" title="Mois précédent">&#8249;</button>
    <div class="nav-label" id="nav-label">—</div>
    <button id="btn-next" title="Mois suivant">&#8250;</button>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item">
    <div class="legend-dot wc"></div>
    WC / Balayage
  </div>
  <div class="legend-item">
    <div class="legend-dot neige"></div>
    Neige
  </div>
</div>

<!-- Calendar -->
<div class="cal-wrap">
  <div class="cal-weekdays">
    <div>Lun</div><div>Mar</div><div>Mer</div>
    <div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div>
  </div>
  <div class="cal-grid" id="cal-grid">
    <div class="state-box" style="grid-column:1/-1">
      <div class="spinner"></div>
      <div>Chargement du planning…</div>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────
const API_URL = 'https://n8n-cbc.ch/webhook/planning';
// ────────────────────────────────────────────────────────

const MONTHS_FR = [
  'Janvier','Février','Mars','Avril','Mai','Juin',
  'Juillet','Août','Septembre','Octobre','Novembre','Décembre'
];

let currentDate = new Date();
let planningData = [];

// ── Fetch data from Budibase ──
async function fetchPlanning() {
  try {
    const res = await fetch(API_URL, {
      method: 'GET',
      headers: { 'Content-Type': 'application/json' }
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    // n8n retourne directement un tableau
    planningData = Array.isArray(json) ? json : (json.data || []);
    renderCalendar();
  } catch (err) {
    console.error('Erreur Budibase:', err);
    document.getElementById('cal-grid').innerHTML = `
      <div class="state-box" style="grid-column:1/-1">
        <div class="error-icon">⚠️</div>
        <div>Impossible de charger le planning</div>
        <div style="font-size:12px;opacity:0.6">${err.message}</div>
      </div>`;
  }
}

// ── Get piquets active on a given date string "YYYY-MM-DD" ──
function getPiquets(dateStr) {
  return planningData.filter(p => {
    if (!p.debut || !p.fin) return false;
    // Normalise: prend uniquement la partie date (avant T)
    const debut = p.debut.substring(0, 10);
    const fin   = p.fin.substring(0, 10);
    return dateStr >= debut && dateStr <= fin;
  });
}

// ── Render the month grid ──
function renderCalendar() {
  const year  = currentDate.getFullYear();
  const month = currentDate.getMonth();

  // Nav label
  document.getElementById('nav-label').textContent =
    MONTHS_FR[month] + ' ' + year;

  const today    = new Date();
  const todayStr = today.getFullYear() + '-' +
                   String(today.getMonth()+1).padStart(2,'0') + '-' +
                   String(today.getDate()).padStart(2,'0');

  // First day of month (0=Sun…6=Sat), convert to Mon-based (0=Mon)
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7;
  const lastDay  = new Date(year, month + 1, 0).getDate();

  let html = '';

  // Empty cells before first day
  for (let i = 0; i < firstDow; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  // Day cells
  for (let d = 1; d <= lastDay; d++) {
    const dateStr = year + '-' +
                    String(month+1).padStart(2,'0') + '-' +
                    String(d).padStart(2,'0');

    const dow = (new Date(year, month, d).getDay());
    const isWeekend = dow === 0 || dow === 6;
    const isToday   = dateStr === todayStr;

    const classes = ['cal-day',
      isToday   ? 'today'   : '',
      isWeekend ? 'weekend' : ''
    ].filter(Boolean).join(' ');

    html += `<div class="${classes}">`;
    html += `<div class="day-num">${d}</div>`;

    getPiquets(dateStr).forEach(p => {
      const type  = (p.type_piquet || '').toLowerCase();
      const cls   = type === 'neige' ? 'neige' : 'wc';
      const label = type === 'neige' ? '❄️ Neige' : '🧹 WC / Balayage';

      const titulaire = ((p.prenom_titulaire || '') + ' ' + (p.nom_titulaire || '')).trim();
      const supplant  = ((p.prenom_supplant  || '') + ' ' + (p.nom_supplant  || '')).trim();

      html += `<div class="piquet ${cls}">`;
      html += `<div class="piquet-type">${label}</div>`;
      if (titulaire) html += `<div class="piquet-role">T: ${titulaire}</div>`;
      if (supplant)  html += `<div class="piquet-role">S: ${supplant}</div>`;
      html += `</div>`;
    });

    html += '</div>';
  }

  document.getElementById('cal-grid').innerHTML = html;
}

// ── Navigation ──
document.getElementById('btn-prev').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
});
document.getElementById('btn-next').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
});

// ── Init ──
fetchPlanning();
</script>
</body>
</html>
