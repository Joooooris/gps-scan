<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBC — Planning Piquet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #f0f2f5;
    --surface:      #ffffff;
    --border:       #e2e6ea;
    --text:         #1a2332;
    --muted:        #7a8899;
    --today-bg:     #1a2332;
    --today-fg:     #ffffff;
    --wc-bg:        #dbeafe;
    --wc-border:    #3b82f6;
    --wc-text:      #1d4ed8;
    --neige-bg:     #e0f2fe;
    --neige-border: #0ea5e9;
    --neige-text:   #0369a1;
    --header-bg:    #1a2332;
    --header-fg:    #ffffff;
    --radius:       10px;
    --shadow:       0 2px 12px rgba(0,0,0,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 8px 10px;
    gap: 6px;
  }

  /* ── Header ── */
  .header {
    background: var(--header-bg);
    color: var(--header-fg);
    border-radius: var(--radius);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }
  .header-left { display:flex; align-items:center; gap:10px; }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: rgba(255,255,255,0.12);
    padding: 5px 8px;
    border-radius: 6px;
    letter-spacing: 1px;
  }
  .header h1 { font-size:16px; font-weight:600; }
  .header h1 span { font-weight:400; opacity:0.6; font-size:13px; margin-left:6px; }

  /* ── Nav ── */
  .nav { display:flex; align-items:center; gap:6px; }
  .nav button {
    background: rgba(255,255,255,0.15);
    border: none; color:#fff;
    width:32px; height:32px;
    border-radius:8px; cursor:pointer;
    font-size:18px; display:flex;
    align-items:center; justify-content:center;
    transition: background 0.15s;
  }
  .nav button:hover { background:rgba(255,255,255,0.28); }
  .nav-label { font-size:14px; font-weight:600; min-width:130px; text-align:center; text-transform:capitalize; }

  /* ── Legend ── */
  .legend { display:flex; gap:12px; flex-wrap:wrap; flex-shrink:0; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:var(--muted); }
  .legend-dot { width:11px; height:11px; border-radius:3px; }
  .legend-dot.wc    { background:var(--wc-border); }
  .legend-dot.neige { background:var(--neige-border); }

  /* ══════════════════════════════════════
     DESKTOP — grille 7 colonnes
  ══════════════════════════════════════ */
  .cal-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--border);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    background: #f7f9fc;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cal-weekdays div {
    text-align:center; padding:6px 4px;
    font-size:10px; font-weight:700;
    letter-spacing:0.8px; text-transform:uppercase;
    color:var(--muted);
  }
  .cal-weekdays div:nth-child(6),
  .cal-weekdays div:nth-child(7) { color:#b0bad0; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    flex:1; min-height:0;
    grid-auto-rows: 1fr;
  }
  .cal-day {
    min-height:0; overflow:hidden;
    border-right:1px solid var(--border);
    border-bottom:1px solid var(--border);
    padding:4px;
    transition:background 0.1s;
  }
  .cal-day:nth-child(7n) { border-right:none; }
  .cal-day.empty   { background:#fafbfc; }
  .cal-day.weekend { background:#fcfcfd; }
  .cal-day:hover:not(.empty) { background:#f5f7fa; }

  .day-num {
    font-family:'DM Mono',monospace;
    font-size:11px; font-weight:500;
    color:var(--muted); margin-bottom:3px;
    display:inline-flex; align-items:center;
    justify-content:center;
    width:22px; height:22px; border-radius:5px;
  }
  .cal-day.today .day-num {
    background:var(--today-bg);
    color:var(--today-fg); font-weight:700;
  }

  /* Piquet badges */
  .piquet {
    border-radius:4px; padding:2px 4px;
    margin-bottom:2px; font-size:10px;
    line-height:1.4; border-left:3px solid transparent;
  }
  .piquet.wc    { background:var(--wc-bg);    border-color:var(--wc-border);    color:var(--wc-text); }
  .piquet.neige { background:var(--neige-bg); border-color:var(--neige-border); color:var(--neige-text); }
  .piquet-type  { font-size:9px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; opacity:0.75; margin-bottom:1px; }
  .piquet-role  { font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* ══════════════════════════════════════
     MOBILE — vue liste
  ══════════════════════════════════════ */
  @media (max-width: 640px) {

    body { padding:8px; gap:8px; overflow:auto; min-height:100vh; height:auto; }

    .header h1 span { display:none; }
    .nav-label { min-width:100px; font-size:13px; }

    /* Cacher la grille desktop */
    .cal-wrap { display:none; }

    /* Vue liste mobile */
    .mobile-list {
      display:flex;
      flex-direction:column;
      gap:6px;
      flex:1;
    }

    /* Jours sans piquet → petite ligne */
    .ml-day {
      background:var(--surface);
      border-radius:8px;
      border:1px solid var(--border);
      padding:8px 12px;
      display:flex;
      align-items:flex-start;
      gap:12px;
    }
    .ml-day.today { border-color:var(--today-bg); border-width:2px; }
    .ml-day.weekend { background:#fafbfc; }

    .ml-date {
      flex-shrink:0;
      text-align:center;
      min-width:44px;
    }
    .ml-date .ml-d {
      font-family:'DM Mono',monospace;
      font-size:22px; font-weight:700;
      line-height:1; color:var(--text);
    }
    .ml-day.today .ml-date .ml-d {
      background:var(--today-bg);
      color:var(--today-fg);
      border-radius:8px;
      padding:2px 6px;
    }
    .ml-date .ml-dow {
      font-size:10px; font-weight:600;
      text-transform:uppercase;
      letter-spacing:0.6px; color:var(--muted);
      margin-top:2px;
    }

    .ml-content { flex:1; }

    .ml-empty-day { color:#c5cdd8; font-size:12px; padding-top:4px; }

    /* Piquet card en liste */
    .ml-piquet {
      border-radius:8px;
      padding:8px 10px;
      margin-bottom:4px;
      border-left:4px solid transparent;
    }
    .ml-piquet:last-child { margin-bottom:0; }
    .ml-piquet.wc    { background:var(--wc-bg);    border-color:var(--wc-border);    color:var(--wc-text); }
    .ml-piquet.neige { background:var(--neige-bg); border-color:var(--neige-border); color:var(--neige-text); }

    .ml-piquet-type {
      font-size:10px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.5px;
      opacity:0.7; margin-bottom:4px;
    }
    .ml-piquet-names { font-size:13px; font-weight:500; line-height:1.6; }

    /* Masquer liste desktop sur mobile */
    .cal-wrap { display:none !important; }
    .mobile-list { display:flex !important; }
  }

  /* Sur desktop, cacher la liste mobile */
  .mobile-list { display:none; }

  /* ── Loading / Error ── */
  .state-box {
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:40px 20px; gap:12px;
    color:var(--muted); font-size:14px;
  }
  .spinner {
    width:26px; height:26px;
    border:3px solid var(--border);
    border-top-color:var(--text);
    border-radius:50%;
    animation:spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">CBC</div>
    <h1>Planning Piquet <span>Service de piquet</span></h1>
  </div>
  <div class="nav">
    <button id="btn-prev">&#8249;</button>
    <div class="nav-label" id="nav-label">—</div>
    <button id="btn-next">&#8250;</button>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot wc"></div>WC / Balayage</div>
  <div class="legend-item"><div class="legend-dot neige"></div>Neige</div>
</div>

<!-- Desktop : grille -->
<div class="cal-wrap">
  <div class="cal-weekdays">
    <div>Lun</div><div>Mar</div><div>Mer</div>
    <div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div>
  </div>
  <div class="cal-grid" id="cal-grid">
    <div class="state-box" style="grid-column:1/-1">
      <div class="spinner"></div>
      <div>Chargement…</div>
    </div>
  </div>
</div>

<!-- Mobile : liste -->
<div class="mobile-list" id="mobile-list">
  <div class="state-box">
    <div class="spinner"></div>
    <div>Chargement…</div>
  </div>
</div>

<script>
const API_URL = 'https://n8n-cbc.ch/webhook/planning';

const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin',
                   'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FR   = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

let currentDate  = new Date();
let planningData = [];

async function fetchPlanning() {
  try {
    const res = await fetch(API_URL, { method:'GET' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    planningData = Array.isArray(json) ? json : (json.data || []);
    render();
  } catch(err) {
    const errHtml = `<div class="state-box" style="grid-column:1/-1">
      <div style="font-size:24px">⚠️</div>
      <div>Impossible de charger le planning</div>
      <div style="font-size:11px;opacity:0.6">${err.message}</div>
    </div>`;
    document.getElementById('cal-grid').innerHTML   = errHtml;
    document.getElementById('mobile-list').innerHTML = errHtml;
  }
}

function getPiquets(dateStr) {
  return planningData.filter(p => {
    if (!p.debut || !p.fin) return false;
    return dateStr >= p.debut.substring(0,10) && dateStr <= p.fin.substring(0,10);
  });
}

function pad(n){ return String(n).padStart(2,'0'); }

function render() {
  const year  = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('nav-label').textContent = MONTHS_FR[month] + ' ' + year;

  const today    = new Date(); today.setHours(0,0,0,0);
  const todayStr = year+'-'+pad(month+1)+'-'+pad(today.getDate());
  const lastDay  = new Date(year, month+1, 0).getDate();

  renderDesktop(year, month, lastDay, todayStr);
  renderMobile(year, month, lastDay, todayStr);
}

/* ── Desktop grid ── */
function renderDesktop(year, month, lastDay, todayStr) {
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7;
  let html = '';
  for(let i=0;i<firstDow;i++) html += '<div class="cal-day empty"></div>';

  for(let d=1;d<=lastDay;d++){
    const dateStr = year+'-'+pad(month+1)+'-'+pad(d);
    const dow     = new Date(year,month,d).getDay();
    const classes = ['cal-day', dateStr===todayStr?'today':'', (dow===0||dow===6)?'weekend':''].filter(Boolean).join(' ');
    html += `<div class="${classes}"><div class="day-num">${d}</div>`;
    getPiquets(dateStr).forEach(p => {
      const cls   = p.type_piquet==='neige'?'neige':'wc';
      const label = p.type_piquet==='neige'?'❄️ Neige':'🧹 WC/Balayage';
      const tit   = ((p.prenom_titulaire||'')+' '+(p.nom_titulaire||'')).trim();
      const sup   = ((p.prenom_supplant||'')+' '+(p.nom_supplant||'')).trim();
      html += `<div class="piquet ${cls}"><div class="piquet-type">${label}</div>`;
      if(tit) html += `<div class="piquet-role">T: ${tit}</div>`;
      if(sup)  html += `<div class="piquet-role">S: ${sup}</div>`;
      html += '</div>';
    });
    html += '</div>';
  }
  document.getElementById('cal-grid').innerHTML = html;
}

/* ── Mobile list ── */
function renderMobile(year, month, lastDay, todayStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  let html = '';

  for(let d=1;d<=lastDay;d++){
    const dateStr = year+'-'+pad(month+1)+'-'+pad(d);
    const dateObj = new Date(year,month,d);
    const dow     = dateObj.getDay();
    const piquets = getPiquets(dateStr);
    const isToday   = dateStr===todayStr;
    const isWeekend = dow===0||dow===6;

    // Sur mobile, n'afficher que les jours avec piquets + aujourd'hui
    if(piquets.length===0 && !isToday) continue;

    const classes = ['ml-day', isToday?'today':'', isWeekend?'weekend':''].filter(Boolean).join(' ');

    html += `<div class="${classes}">
      <div class="ml-date">
        <div class="ml-d">${d}</div>
        <div class="ml-dow">${DAYS_FR[dow]}</div>
      </div>
      <div class="ml-content">`;

    if(piquets.length===0){
      html += `<div class="ml-empty-day">Aucun piquet</div>`;
    } else {
      piquets.forEach(p => {
        const cls   = p.type_piquet==='neige'?'neige':'wc';
        const label = p.type_piquet==='neige'?'❄️ Neige':'🧹 WC / Balayage';
        const tit   = ((p.prenom_titulaire||'')+' '+(p.nom_titulaire||'')).trim();
        const sup   = ((p.prenom_supplant||'')+' '+(p.nom_supplant||'')).trim();
        html += `<div class="ml-piquet ${cls}">
          <div class="ml-piquet-type">${label}</div>
          <div class="ml-piquet-names">`;
        if(tit) html += `👤 T: <b>${tit}</b><br>`;
        if(sup)  html += `👤 S: <b>${sup}</b>`;
        html += `</div></div>`;
      });
    }

    html += `</div></div>`;
  }

  if(!html) html = '<div class="state-box"><div>Aucun piquet ce mois-ci</div></div>';
  document.getElementById('mobile-list').innerHTML = html;
}

document.getElementById('btn-prev').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth()-1); render();
});
document.getElementById('btn-next').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth()+1); render();
});

fetchPlanning();
</script>
</body>
</html>
