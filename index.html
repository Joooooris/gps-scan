<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test GPS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <p id="status">Page chargée...</p>

  <script>
    function setStatus(message) {
      document.getElementById("status").innerText = message;
      console.log(message);
    }

    setStatus("Début du script");

    if (!navigator.geolocation) {
      setStatus("La géolocalisation n'est pas disponible sur cet appareil.");
    } else {
      setStatus("Demande de position...");

      navigator.geolocation.getCurrentPosition(
        function(position) {
          setStatus(
            "Latitude : " +
            position.coords.latitude +
            " | Longitude : " +
            position.coords.longitude
          );
        },
        function(error) {
          setStatus("Erreur GPS : " + error.code + " - " + error.message);
        },
        {
          enableHighAccuracy: true,
          timeout: 20000,
          maximumAge: 30000
        }
      );
    }
  </script>
</body>
</html>
