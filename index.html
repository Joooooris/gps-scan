<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS + Webhook</title>
</head>
<body>
  <p id="status">Chargement...</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const qr = params.get("qr");

    const WORKER_URL = "https://calm-unit-e415.j-simon.workers.dev";

    function setStatus(message) {
      document.getElementById("status").innerText = message;
      console.log(message);
    }

    if (!navigator.geolocation) {
      setStatus("La géolocalisation n'est pas disponible.");
    } else {
      setStatus("Demande de position...");

      navigator.geolocation.getCurrentPosition(
        async function(position) {
          const payload = {
            qr_code: qr,
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
            timestamp: new Date().toISOString()
          };

          setStatus("Position trouvée, envoi...");

          try {
            await fetch(WORKER_URL, {
              method: "POST",
              mode: "no-cors",
              headers: {
                "Content-Type": "text/plain"
              },
              body: JSON.stringify(payload)
            });

            setStatus("Requête envoyée");
          } catch (error) {
            setStatus("Erreur webhook : " + error.message);
          }
        },
        function(error) {
          setStatus("Erreur GPS : " + error.code + " - " + error.message);
        },
        {
          enableHighAccuracy: true,
          timeout: 20000,
          maximumAge: 30000
        }
      );
    }
  </script>
</body>
</html>
