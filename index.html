<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBC — Scan QR</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 { font-size: 1.4rem; color: #333; margin-bottom: 20px; }
    #qrText, #employeeText, #actionText, #vehiculeText {
      font-size: 1rem;
      color: #555;
      margin: 4px 0;
    }
    #status {
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
    }
    #countdown { margin-top: 10px; font-size: 0.95rem; color: #777; }
    .ok    { color: #2e7d32; }
    .error { color: #c62828; }
    .info  { color: #1565c0; }
  </style>
</head>
<body>
  <h1>CBC — Enregistrement des heures</h1>
  <p id="actionText"></p>
  <p id="qrText"></p>
  <p id="employeeText"></p>
  <p id="vehiculeText"></p>
  <p id="status">Chargement en cours...</p>
  <p id="countdown"></p>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const WORKER_URL = "https://calm-unit-e415.j-simon.workers.dev";
      const BUDIBASE_URL = "https://cbcsalaires.budibase.app/app/default%20workspace/cbcheures#/saisie-des-heures-";

      const params       = new URLSearchParams(window.location.search);
      const qr           = params.get("qr");
      const id_personnel = params.get("id_personnel");
      const action       = params.get("action") || "debut";
      const tache_id     = params.get("tache_id") || null;
      const vehicule_id  = params.get("vehicule_id") || null;

      const statusElement    = document.getElementById("status");
      const qrElement        = document.getElementById("qrText");
      const employeeElement  = document.getElementById("employeeText");
      const actionElement    = document.getElementById("actionText");
      const vehiculeElement  = document.getElementById("vehiculeText");
      const countdownElement = document.getElementById("countdown");

      // Affichage selon l'action
      const actionLabels = {
        debut:   "▶️ Début de tâche",
        pause:   "⏸️ Pause midi",
        reprise: "▶️ Reprise après pause"
      };
      actionElement.innerText = actionLabels[action] || "Enregistrement";

      if (!qr || !id_personnel) {
        qrElement.innerText    = "QR code ou employé manquant.";
        employeeElement.innerText = "";
        statusElement.innerText   = "Erreur : le lien doit contenir qr et id_personnel.";
        statusElement.className   = "error";
      } else {
        qrElement.innerText       = "QR code : " + qr;
        employeeElement.innerText = "Employé : " + id_personnel;
        if (vehicule_id) {
          vehiculeElement.innerText = "🚐 Véhicule : " + vehicule_id;
        }
        getLocationAndSend();
      }

      function getLocationAndSend() {
        if (!navigator.geolocation) {
          statusElement.innerText  = "La géolocalisation n'est pas supportée par ce téléphone.";
          statusElement.className  = "error";
          return;
        }
        statusElement.innerText  = "Récupération de la position GPS...";
        statusElement.className  = "info";

        navigator.geolocation.getCurrentPosition(
          async function (position) {
            const now = new Date();
            const dateLocale =
              now.getFullYear() + "-" +
              String(now.getMonth() + 1).padStart(2, "0") + "-" +
              String(now.getDate()).padStart(2, "0");
            const heureLocale =
              String(now.getHours()).padStart(2, "0") + ":" +
              String(now.getMinutes()).padStart(2, "0") + ":" +
              String(now.getSeconds()).padStart(2, "0");

            const payload = {
              action:       action,
              qr_code:      Number(qr),
              id_personnel: Number(id_personnel),
              tache_id:     tache_id ? Number(tache_id) : null,
              vehicule_id:  vehicule_id ? Number(vehicule_id) : null,
              latitude:     position.coords.latitude,
              longitude:    position.coords.longitude,
              dates:        dateLocale,
              heures:       heureLocale,
              timestamp:    now.toISOString()
            };

            try {
              statusElement.innerText = "Envoi des données...";
              const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              });
              const result = await response.text();
              if (response.ok) {
                const messages = {
                  debut:   "✅ Début de tâche enregistré.",
                  pause:   "⏸️ Pause enregistrée.",
                  reprise: "✅ Reprise enregistrée."
                };
                statusElement.innerText = messages[action] || "✅ Enregistré.";
                statusElement.className = "ok";
                redirectToApp(3);
              } else {
                statusElement.innerText = "Erreur lors de l'envoi : " + result;
                statusElement.className = "error";
              }
            } catch (error) {
              statusElement.innerText = "Erreur de connexion : " + error.message;
              statusElement.className = "error";
            }
          },
          function () {
            statusElement.innerText = "Géolocalisation refusée ou impossible.";
            statusElement.className = "error";
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      }

      function redirectToApp(secondes) {
        let restant = secondes;
        countdownElement.innerText = "Redirection dans " + restant + " seconde(s)...";
        const interval = setInterval(function () {
          restant--;
          if (restant <= 0) {
            clearInterval(interval);
            window.location.href = BUDIBASE_URL;
          } else {
            countdownElement.innerText = "Redirection dans " + restant + " seconde(s)...";
          }
        }, 1000);
      }
    });
  </script>
</body>
</html>
